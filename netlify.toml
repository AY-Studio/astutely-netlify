# Netlify configuration for the Astutely static site.
# No build step yet — the site is published as-is. (When we add Eleventy for the
# news CMS, this becomes: command = "npx @11ty/eleventy", publish = "_site".)

[build]
  publish = "."

# --- Clean URLs -------------------------------------------------------------
# Netlify already serves /contact for contact.html. These redirects send the
# .html versions to the extensionless canonical so there's only ever one URL.
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301
  force = true

# --- Sensible default headers ----------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

# Long-cache the fingerprinted/static assets (they're versioned via ?v=)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
